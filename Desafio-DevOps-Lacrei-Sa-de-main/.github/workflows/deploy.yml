name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - staging

env:
  DOCKER_IMAGE: lacrei-app

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Lint JavaScript files
        run: |
          npx eslint src/index.js --no-eslintrc --env node --env es2021 || echo "Linting completed with warnings"
      
      - name: Validate package.json
        run: npm ls --depth=0
      
      - name: Build Docker image
        run: docker build -t ${{ env.DOCKER_IMAGE }}:${{ github.sha }} .
      
      - name: Run security scan on Docker image
        run: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image --severity HIGH,CRITICAL \
            --exit-code 0 ${{ env.DOCKER_IMAGE }}:${{ github.sha }} || echo "Security scan completed"
      
      - name: Test Docker container - Health Check
        run: |
          echo "Starting container..."
          docker run -d -p 3000:3000 --name test-container ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          
          echo "Waiting for container to be ready..."
          sleep 10
          
          echo "Testing /status endpoint..."
          RESPONSE=$(curl -s http://localhost:3000/status)
          echo "Response: $RESPONSE"
          
          # Validate JSON response
          echo "$RESPONSE" | jq -e '.status == "ok"' || exit 1
          
          echo "Testing root endpoint..."
          curl -f http://localhost:3000/ || exit 1
          
          echo "🧹 Cleaning up..."
          docker stop test-container
          docker rm test-container
      
      - name: Save Docker image
        run: docker save ${{ env.DOCKER_IMAGE }}:${{ github.sha }} | gzip > app-image.tar.gz
      
      - name: Upload Docker image
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: app-image.tar.gz
          retention-days: 5

  deploy-staging:
    needs: build-and-test
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://54.226.194.208/status
    
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      
      - name: Deploy to Staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "app-image.tar.gz"
          target: "/home/ubuntu/"
      
      - name: Run Docker on Staging
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Carregar imagem
            docker load < /home/ubuntu/app-image.tar.gz
            
            # Backup da imagem atual (para rollback)
            docker tag lacrei-app-staging lacrei-app-staging:backup || true
            
            # Parar container antigo se existir
            docker stop lacrei-app-staging || true
            docker rm lacrei-app-staging || true
            
            # Rodar novo container
            docker run -d \
              --name lacrei-app-staging \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=staging \
              lacrei-app:${{ github.sha }}
            
            # Aguardar container iniciar
            sleep 5
            
            # Health check
            curl -f http://localhost:3000/status || exit 1
            
            # Limpar imagens antigas (exceto backup)
            docker image prune -af
            
            # Remover arquivo temporário
            rm -f /home/ubuntu/app-image.tar.gz
      
      - name: Post-deployment smoke test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Running smoke tests..."
            
            # Test 1: Container is running
            docker ps | grep lacrei-app-staging || exit 1
            
            # Test 2: Application responds
            curl -f http://localhost:3000/status || exit 1
            
            # Test 3: Logs are being generated
            docker logs --tail 5 lacrei-app-staging
            
            echo "All smoke tests passed!"

  deploy-production:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://54.159.81.199/status
    
    steps:
      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      
      - name: Deploy to Production
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "app-image.tar.gz"
          target: "/home/ubuntu/"
      
      - name: Run Docker on Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Carregar imagem
            docker load < /home/ubuntu/app-image.tar.gz
            
            # Backup da imagem atual (para rollback)
            docker tag lacrei-app-production lacrei-app-production:backup || true
            
            # Parar container antigo se existir
            docker stop lacrei-app-production || true
            docker rm lacrei-app-production || true
            
            # Rodar novo container
            docker run -d \
              --name lacrei-app-production \
              --restart unless-stopped \
              -p 3000:3000 \
              -e NODE_ENV=production \
              lacrei-app:${{ github.sha }}
            
            # Aguardar container iniciar
            sleep 5
            
            # Health check
            curl -f http://localhost:3000/status || exit 1
            
            # Limpar imagens antigas (exceto backup)
            docker image prune -af
            
            # Remover arquivo temporário
            rm -f /home/ubuntu/app-image.tar.gz
      
      - name: Post-deployment smoke test
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Running smoke tests..."
            
            # Test 1: Container is running
            docker ps | grep lacrei-app-production || exit 1
            
            # Test 2: Application responds
            curl -f http://localhost:3000/status || exit 1
            
            # Test 3: Environment is correct
            RESPONSE=$(curl -s http://localhost:3000/status)
            echo "$RESPONSE" | grep '"environment":"production"' || exit 1
            
            # Test 4: Logs are being generated
            docker logs --tail 5 lacrei-app-production
            
            echo "All smoke tests passed!"
      
      - name: Notify deployment success
        if: success()
        run: |
          echo "Production deployment successful!"
          echo "Commit: ${{ github.sha }}"
          echo "URL: https://54.159.81.199/status"